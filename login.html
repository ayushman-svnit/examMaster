<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></head>
</head>
<body>
    <div id="container">
        <h1>Login Here</h1>
        <form method="GET" action="/login">
            <label for="username">Username</label><br>
            <input type="text" id="username" placeholder="Enter Username" name="username" required><br>
            <p>OR</p>
            <label for="email">E-mail</label><br>
            <input type="email" id="email" placeholder="Enter e-mail" name="email" required><br>
            <label for="password">Password</label><br>
            <input type="password" id="password" placeholder="Enter Password" name="password" required><button id="btn" type="button"><i class="fa fa-eye-slash"></i></button><br>
            <button id="login">Log in</button>
            <p>Click here to register <a href="register.html">Click Here</a></p>
        </form>
    </div>
    <script src="/register.js"></script>
</body>
</html>
